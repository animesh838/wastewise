{% extends 'base/base.html' %}

{% block title %}Delete Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body">
        <h4 class="text-danger"><i class="bi bi-exclamation-triangle"></i> Delete Account</h4>
        <p class="mb-4">This action is permanent and will remove your data associated with this account.</p>
        <form method="post">
          {% csrf_token %}
          <a href="{% url 'users:profile' %}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-danger">Yes, delete my account</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
