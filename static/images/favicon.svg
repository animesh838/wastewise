    <!-- First arrow -->
    <path d="M12 8 L16 12 L20 8 L18 8 L18 14 L12 14 Z" fill="#ffffff"/>
    <!-- Second arrow -->
    <path d="M20 16 L16 20 L12 16 L14 16 L14 22 L20 22 Z" fill="#ffffff"/>
    <!-- Third arrow -->
